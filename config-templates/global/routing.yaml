      - "stepfun/step-3.5-flash"
      - "deepseek/v4-flash"
    fallback:
      - "nvidia/nemotron-3-nano-omni"

  code_completion:
    description: "In-line code completion, autocomplete, syntax completion — Mistral specialty"
